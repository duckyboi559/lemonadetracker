<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lemonade Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>Lemonade Tracker</h1>
    <p class="subtitle">Tap Counter</p>

    <div class="grid">
      <div class="tile lemonade" onclick="changeCount('classic', 1)">
        <h2>Classic Lemonade</h2>
        <p>$6</p>
        <div class="count" id="classicCount">0</div>
      </div>

      <div class="tile lemonade" onclick="changeCount('flavor', 1)">
        <h2>Flavor Lemonade</h2>
        <p>$7</p>
        <div class="count" id="flavorCount">0</div>
      </div>

      <div class="tile lemonade" onclick="changeCount('speciality', 1)">
        <h2>Speciality Lemonade</h2>
        <p>$8</p>
        <div class="count" id="specialityCount">0</div>
      </div>

      <div class="tile lemonade" onclick="changeCount('redbull', 1)">
        <h2>Red Bull Lemonade</h2>
        <p>$9</p>
        <div class="count" id="redbullCount">0</div>
      </div>

      <div class="tile lemonade" onclick="changeCount('classic64', 1)">
        <h2>64oz Classic</h2>
        <p>$10</p>
        <div class="count" id="classic64Count">0</div>
      </div>

      <div class="tile lemonade" onclick="changeCount('speciality64', 1)">
        <h2>64oz Speciality</h2>
        <p>$15</p>
        <div class="count" id="speciality64Count">0</div>
      </div>
    </div>

    <div class="summary-card">
      <h2>Grand Total</h2>
      <div class="grand-total" id="grandTotal">$0.00</div>
    </div>

    <div class="summary-card">
      <h2>Total Drinks Sold</h2>
      <div class="grand-total" id="totalItems">0</div>
    </div>

    <div class="summary-card">
      <h2>Today's Date</h2>
      <p id="todayDate"></p>
    </div>

    <div class="action-row">
      <button class="save-btn" onclick="saveDay()">Save Day</button>
      <button class="reset-btn" onclick="resetDay()">Reset Day</button>
    </div>

    <div class="summary-card">
      <h2>Previous Days</h2>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
